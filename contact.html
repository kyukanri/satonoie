<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お問い合わせ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu-btn" id="menuBtn">
    <span></span>
    <span></span>
</div>

<div class="overlay" id="overlay"></div>

<div class="side-menu" id="sideMenu">
    <a href="index.html">トップページ</a>
    <a href="about.html">会社概要</a>
    <a href="service.html">施設紹介</a>
    <a href="contact.html">お問い合わせ</a>
</div>

<div class="page">
    <h1>お問い合わせ</h1>

    <form id="contactForm"
      class="contact-form"
      action="https://formspree.io/f/xgojqwry"
      method="POST">

        <input type="hidden" name="_subject" value="HOLO BASE お問い合わせ">

        <input type="hidden"
            name="_next"
            value="https://holo-base.com/thanks.html">

        <label>
            お名前 <span>*</span>
            <input
                type="text"
                name="name"
                required>
        </label>

        <label>
            メールアドレス <span>*</span>
            <input
                type="email"
                name="email"
                required>
        </label>

        <label>
            お問い合わせ内容 <span>*</span>
            <textarea
                name="message"
                rows="7"
                required></textarea>
        </label>

        <button id="submitBtn" type="submit">
            送信する
        </button>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
